image: alpine/edge
packages:
  - curl
  - cmake
  - gcc
  - cargo-deny
  - reuse
sources:
  - https://git.sr.ht/~awkless/ocd
tasks:
  - setup: |-
      curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain stable -y
  - reuse_check: |
      cd ocd
      reuse lint
  - code_check: |
      cd ocd
      source $HOME/.cargo/env
      cargo test --all -- --nocapture
      cargo fmt --all --check
      cargo clippy --no-deps -- -Dwarnings
  - dependency_check: |
      cd ocd
      source $HOME/.cargo/env
      cargo deny check
